services:
  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    restart: unless-stopped
    ports:
      - "${PORT:-47829}:${PORT:-47829}"
    environment:
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      PLAID_DAYS_REQUESTED: ${PLAID_DAYS_REQUESTED:-90}
      PLAID_REDIRECT_URI: ${PLAID_REDIRECT_URI:-}
      PLAID_WEBHOOK_URL: ${PLAID_WEBHOOK_URL:-}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-mmm}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-47829}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-300}
      SYNC_ON_STARTUP: ${SYNC_ON_STARTUP:-true}

  analysis:
    build:
      context: .
      dockerfile: Dockerfile.analysis
    restart: unless-stopped
    ports:
      - "${ANALYSIS_PORT:-47830}:${ANALYSIS_PORT:-47830}"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-mmm}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-16384}
      ANALYSIS_INTERVAL_SECONDS: ${ANALYSIS_INTERVAL_SECONDS:-300}
      ANALYSIS_ON_STARTUP: ${ANALYSIS_ON_STARTUP:-true}
      ANALYSIS_BATCH_SIZE: ${ANALYSIS_BATCH_SIZE:-30}
      ANALYSIS_WINDOW_DAYS: ${ANALYSIS_WINDOW_DAYS:-90}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.75}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-tavily}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-3}
      SEARCH_MAX_QUERIES: ${SEARCH_MAX_QUERIES:-5}
      SEARCH_MAX_CONCURRENT: ${SEARCH_MAX_CONCURRENT:-3}
      SEARCH_TIMEOUT_SECONDS: ${SEARCH_TIMEOUT_SECONDS:-15}
      WECHAT_ENABLED: ${WECHAT_ENABLED:-true}
      WECHAT_DATE_WINDOW_DAYS: ${WECHAT_DATE_WINDOW_DAYS:-3}
      WECHAT_AMOUNT_TOLERANCE_RATIO: ${WECHAT_AMOUNT_TOLERANCE_RATIO:-0.15}
      WECHAT_USD_CNY_RATE: ${WECHAT_USD_CNY_RATE:-7.2}
      WECHAT_MAX_CANDIDATES: ${WECHAT_MAX_CANDIDATES:-15}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${ANALYSIS_PORT:-47830}

  viewer:
    build:
      context: .
      dockerfile: Dockerfile.viewer
    restart: unless-stopped
    ports:
      - "${VIEWER_PORT:-47831}:${VIEWER_PORT:-47831}"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-mmm}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${VIEWER_PORT:-47831}
